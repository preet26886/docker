version: '2'

services:
  db:
    image: mariadb:10.1  # Using MariaDB as the database
    environment:
      MYSQL_ROOT_PASSWORD: your_mysql_root_password  # Set MySQL root password
      MYSQL_USER: your_filerun_username  # Database username for FileRun
      MYSQL_PASSWORD: your_filerun_password  # Database password for FileRun
      MYSQL_DATABASE: your_filerun_database  # Database name for FileRun
    volumes:
      - data:/var/lib/mysql  # Storing database data in a named volume

  web:
    image: filerun/filerun:8.1  # Using the latest FileRun image
    environment:
      FR_DB_HOST: db  # Database service name
      FR_DB_PORT: 3306  # MySQL default port
      FR_DB_NAME: your_filerun_database  # FileRun database name
      FR_DB_USER: your_filerun_username  # FileRun database username
      FR_DB_PASS: your_filerun_password  # FileRun database password
      APACHE_RUN_USER: www-data  # Web server user
      APACHE_RUN_USER_ID: 33  # Web server user ID
      APACHE_RUN_GROUP: www-data  # Web server group
      APACHE_RUN_GROUP_ID: 33  # Web server group ID
    depends_on:
      - db  # Ensures the database starts before FileRun
    links:
      - db:db  # Links the FileRun container to the database
    ports:
      - "80:80"  # Exposing the container's port 80 to the host
    volumes:
      - filerun_html:/var/www/html  # FileRun application files
      - filerun_files:/user-files  # User-uploaded files

# Named volumes for persistent storage
volumes:
  data:
  filerun_html:
  filerun_files:
